<div id="home-services-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
    </div>

<script type="module">
    import { supabase } from './admin/supabase.js';

    async function loadServices() {
        const { data, error } = await supabase
            .from('services')
            .select('*');

        if (error) {
            console.error("Error:", error);
            return;
        }

        const grid = document.getElementById('home-services-grid');
        grid.innerHTML = data.map(item => `
            <a href="${item.category}.html" class="group relative block bg-stone-950 border border-stone-900 overflow-hidden hover:border-gold transition duration-300">
                <div class="h-80 overflow-hidden relative">
                    <img src="${item.image_url}" alt="${item.title}" class="w-full h-full object-cover transition duration-500 group-hover:scale-105 opacity-80">
                </div>
                <div class="p-6 text-center">
                    <h3 class="font-luxury text-lg text-white tracking-widest group-hover:text-gold">${item.title}</h3>
                    <p class="text-stone-500 text-xs mt-1">${item.description}</p>
                </div>
            </a>
        `).join('');
    }

    loadServices();
</script>
