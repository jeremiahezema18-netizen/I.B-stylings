<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I.B Stylings - Services</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
</head>
<body class="bg-gray-100">
  <div class="flex">
    <div class="w-64 h-screen bg-black text-white fixed">
      <div class="p-6">
        <h1 class="text-2xl font-bold text-yellow-400">I.B Stylings</h1>
        <p class="text-gray-400 text-sm mt-1">Admin Dashboard</p>
      </div>
      <nav class="mt-8">
        <a href="dashboard.html" class="block px-6 py-4 hover:bg-gray-900">🏠 Dashboard</a>
        <a href="services.html" class="block px-6 py-4 bg-gray-900">✂ Services</a>
        <a href="add-service.html" class="block px-6 py-4 hover:bg-gray-900">➕ Add Service</a>
        <a href="bookings.html" class="block px-6 py-4 hover:bg-gray-900">📅 Bookings</a>
        <a href="#" onclick="logout()" class="block px-6 py-4 text-red-400 hover:bg-red-900">🚪 Logout</a>
      </nav>
    </div>

    <div class="ml-64 flex-1 p-10">
      <div class="flex justify-between items-center">
        <div>
          <h2 class="text-4xl font-bold">Services</h2>
          <p class="text-gray-600 mt-2">Manage your salon offerings.</p>
        </div>
        <a href="add-service.html" class="bg-yellow-400 text-black font-bold px-6 py-3 rounded-lg hover:bg-yellow-500 transition">
          + Add New Service
        </a>
      </div>

      <div class="bg-white rounded-xl shadow-lg mt-10 p-6 overflow-hidden">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="border-b text-gray-400">
              <th class="py-3 px-4">Service Name</th>
              <th class="py-3 px-4">Category</th>
              <th class="py-3 px-4">Price</th>
              <th class="py-3 px-4">Actions</th>
            </tr>
          </thead>
          <tbody id="servicesList">
            <tr>
              <td colspan="4" class="py-6 text-center text-gray-500">Loading services...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    async function checkAuth() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        window.location.href = "index.html";
      }
    }

    async function loadServices() {
      await checkAuth();
      try {
        const { data: services, error } = await supabase
          .from('services')
          .select('*')
          .order('name', { ascending: true });

        if (error) throw error;

        const servicesList = document.getElementById('servicesList');
        servicesList.innerHTML = '';

        if (!services || services.length === 0) {
          servicesList.innerHTML = `<tr><td colspan="4" class="py-6 text-center text-gray-500">No services added yet.</td></tr>`;
          return;
        }

        services.forEach(service => {
          const row = document.createElement('tr');
          row.className = "border-b hover:bg-gray-50";
          row.innerHTML = `
            <td class="py-4 px-4 font-semibold">${service.name}</td>
            <td class="py-4 px-4"><span class="bg-gray-100 text-gray-800 text-xs px-2.5 py-0.5 rounded">${service.category || 'General'}</span></td>
            <td class="py-4 px-4 font-bold text-yellow-600">₦${service.price}</td>
            <td class="py-4 px-4">
              <button onclick="deleteService('${service.id}')" class="text-red-500 hover:text-red-700 font-medium">Delete</button>
            </td>
          `;
          servicesList.appendChild(row);
        });
      } catch (err) {
        console.error("Error fetching services:", err.message);
      }
    }

    async function deleteService(id) {
      if (!confirm("Are you sure you want to delete this service?")) return;
      
      try {
        const { error } = await supabase.from('services').delete().eq('id', id);
        if (error) throw error;
        alert("Service deleted successfully!");
        loadServices();
      } catch (err) {
        alert("Error deleting service: " + err.message);
      }
    }

    async function logout() {
      await supabase.auth.signOut();
      window.location.href = "index.html";
    }

    document.addEventListener("DOMContentLoaded", loadServices);
  </script>
</body>
</html>
