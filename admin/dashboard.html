<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>I.B Stylings Admin Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="supabase.js"></script>

</head>

<body class="bg-gray-100">

<div class="flex">

<!-- Sidebar -->

<div class="w-64 h-screen bg-black text-white fixed">

<div class="p-6">

<h1 class="text-2xl font-bold text-yellow-400">
I.B Stylings
</h1>

<p class="text-gray-400 text-sm mt-1">
Admin Dashboard
</p>

</div>

<nav class="mt-8">

<a href="dashboard.html"
class="block px-6 py-4 hover:bg-gray-900">
🏠 Dashboard
</a>

<a href="services.html"
class="block px-6 py-4 hover:bg-gray-900">
✂ Services
</a>

<a href="add-service.html"
class="block px-6 py-4 hover:bg-gray-900">
➕ Add Service
</a>

<a href="bookings.html"
class="block px-6 py-4 hover:bg-gray-900">
📅 Bookings
</a>

<a href="#"
onclick="logout()"
class="block px-6 py-4 text-red-400 hover:bg-red-900">
🚪 Logout
</a>

</nav>

</div>

<!-- Main Content -->

<div class="ml-64 flex-1 p-10">

<h2 class="text-4xl font-bold">
Welcome Admin 👋
</h2>

<p class="text-gray-600 mt-2">
Manage your salon from here.
</p>

<div class="grid grid-cols-3 gap-6 mt-10">

<div class="bg-white rounded-xl shadow-lg p-6">

<h3 class="text-gray-500">
Total Services
</h3>

<p
id="serviceCount"
class="text-4xl font-bold mt-3">
0
</p>

</div>

<div class="bg-white rounded-xl shadow-lg p-6">

<h3 class="text-gray-500">
Bookings
</h3>

<p
id="bookingCount"
class="text-4xl font-bold mt-3">
0
</p>

</div>

<div class="bg-white rounded-xl shadow-lg p-6">

<h3 class="text-gray-500">
Admin
</h3>

<p
id="adminEmail"
class="text-lg mt-3">
Loading...
</p>

</div>

</div>
<script>
  // 1. Initialize & check if the admin is logged in
  async function initDashboard() {
    const { data: { session }, error: sessionError } = await supabase.auth.getSession();

    if (sessionError || !session) {
      // No active session? Kick them back to the login page!
      alert("Unauthorized access. Please log in first.");
      window.location.href = "index.html"; // Change to "login.html" if your login page has a different name
      return;
    }

    // 2. Display your email
    const adminEmailEl = document.getElementById("adminEmail");
    if (adminEmailEl) {
      adminEmailEl.textContent = session.user.email;
    }

    // 3. Count your services
    try {
      const { count: serviceCount, error: serviceError } = await supabase
        .from('services') // Assumes your Supabase table is named 'services'
        .select('*', { count: 'exact', head: true });

      if (serviceError) throw serviceError;

      const serviceCountEl = document.getElementById("serviceCount");
      if (serviceCountEl) {
        serviceCountEl.textContent = serviceCount || 0;
      }
    } catch (err) {
      console.error("Error fetching services count:", err.message);
    }

    // 4. Count your bookings
    try {
      const { count: bookingCount, error: bookingError } = await supabase
        .from('bookings') // Assumes your Supabase table is named 'bookings'
        .select('*', { count: 'exact', head: true });

      if (bookingError) throw bookingError;

      const bookingCountEl = document.getElementById("bookingCount");
      if (bookingCountEl) {
        bookingCountEl.textContent = bookingCount || 0;
      }
    } catch (err) {
      console.error("Error fetching bookings count:", err.message);
    }
  }

  // 5. Add the Logout function
  async function logout() {
    const { error } = await supabase.auth.signOut();
    if (error) {
      alert("Error logging out: " + error.message);
    } else {
      alert("Logged out successfully!");
      window.location.href = "index.html"; // Redirects back to login page
    }
  }

  // Run the initialization when the page loads
  document.addEventListener("DOMContentLoaded", initDashboard);
</script>

</body>
</html>
