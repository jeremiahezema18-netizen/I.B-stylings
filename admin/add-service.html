<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I.B Stylings - Add Service</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
</head>
<body class="bg-gray-100">
  <div class="flex">
    <div class="w-64 h-screen bg-black text-white fixed">
      <div class="p-6">
        <h1 class="text-2xl font-bold text-yellow-400">I.B Stylings</h1>
        <p class="text-gray-400 text-sm mt-1">Admin Dashboard</p>
      </div>
      <nav class="mt-8">
        <a href="dashboard.html" class="block px-6 py-4 hover:bg-gray-900">🏠 Dashboard</a>
        <a href="services.html" class="block px-6 py-4 hover:bg-gray-900">✂ Services</a>
        <a href="add-service.html" class="block px-6 py-4 bg-gray-900">➕ Add Service</a>
        <a href="bookings.html" class="block px-6 py-4 hover:bg-gray-900">📅 Bookings</a>
        <a href="#" onclick="logout()" class="block px-6 py-4 text-red-400 hover:bg-red-900">🚪 Logout</a>
      </nav>
    </div>

    <div class="ml-64 flex-1 p-10">
      <h2 class="text-4xl font-bold">Add New Service</h2>
      <p class="text-gray-600 mt-2">Create a new hair, lash, or nail styling service.</p>

      <div class="bg-white rounded-xl shadow-lg mt-10 p-8 max-w-2xl">
        <form id="serviceForm" class="space-y-6">
          <div>
            <label class="block text-gray-700 font-semibold mb-2">Service Name</label>
            <input type="text" id="serviceName" required placeholder="e.g., Luxury Box Braids" class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400">
          </div>

          <div>
            <label class="block text-gray-700 font-semibold mb-2">Category</label>
            <select id="serviceCategory" required class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400">
              <option value="Hair">Hair Styling</option>
              <option value="Nails">Nails</option>
              <option value="Lashes">Lashes / Eyes</option>
              <option value="Male Cutz">Male Cutz</option>
            </select>
          </div>

          <div>
            <label class="block text-gray-700 font-semibold mb-2">Price (₦)</label>
            <input type="number" id="servicePrice" required placeholder="e.g., 15000" class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400">
          </div>

          <button type="submit" class="w-full bg-yellow-400 text-black font-bold py-3 rounded-lg hover:bg-yellow-500 transition">
            Save Service
          </button>
        </form>
      </div>
    </div>
  </div>

  <script>
    async function checkAuth() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        window.location.href = "index.html";
      }
    }

    document.getElementById('serviceForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('serviceName').value;
      const category = document.getElementById('serviceCategory').value;
      const price = parseFloat(document.getElementById('servicePrice').value);

      try {
        const { error } = await supabase
          .from('services')
          .insert([{ name, category, price }]);

        if (error) throw error;

        alert("Service added successfully!");
        document.getElementById('serviceForm').reset();
        window.location.href = "services.html";
      } catch (err) {
        alert("Error saving service: " + err.message);
      }
    });

    async function logout() {
      await supabase.auth.signOut();
      window.location.href = "index.html";
    }

    document.addEventListener("DOMContentLoaded", checkAuth);
  </script>
</body>
</html>
