<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-10">
    <div class="max-w-md mx-auto bg-stone-900 p-8 border border-stone-800">
        <h2 class="text-2xl mb-6 text-gold">Add New Service</h2>
        <form id="service-form" class="space-y-4">
            <input type="text" id="title" placeholder="Title (e.g. NAIL ARTISTRY)" class="w-full p-2 bg-black border border-stone-700" required>
            <input type="text" id="category" placeholder="Category (e.g. nails)" class="w-full p-2 bg-black border border-stone-700" required>
            <input type="text" id="description" placeholder="Description" class="w-full p-2 bg-black border border-stone-700" required>
            <input type="text" id="image_url" placeholder="Image URL" class="w-full p-2 bg-black border border-stone-700" required>
            <button type="submit" class="w-full bg-gold text-black font-bold py-2">SAVE SERVICE</button>
        </form>
    </div>

    <script type="module">
        import { supabase } from './supabase.js';

        document.getElementById('service-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const service = {
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                description: document.getElementById('description').value,
                image_url: document.getElementById('image_url').value
            };

            const { data, error } = await supabase.from('services').insert([service]);

            if (error) alert("Error: " + error.message);
            else {
                alert("Service added successfully!");
                location.reload();
            }
        });
    </script>
</body>
</html>
