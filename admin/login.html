<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I.B Stylings Admin Login</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background:#111827;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:sans-serif;
}

.card{
background:white;
padding:35px;
border-radius:15px;
width:350px;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

input{
width:100%;
padding:12px;
margin-top:15px;
border:1px solid #ddd;
border-radius:8px;
}

button{
width:100%;
margin-top:20px;
padding:12px;
background:black;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#333;
}

h1{
text-align:center;
font-size:28px;
margin-bottom:20px;
}
</style>

</head>
<body>

<div class="card">

<h1>Admin Login</h1>

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button type="button" onclick="login()">
Login
</button>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>

async function login() {

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    alert("Trying to log in...");

alert(typeof window.supabase);

alert(typeof window.supabaseClient);

    try {

    const { data, error } = await window.supabaseClient.auth.signInWithPassword({
        email,
        password
    });

    if (error) {
        alert(error.message);
        return;
    }

    alert("Login successful!");
    window.location.href = "dashboard.html";

} catch (err) {
    alert("ERROR: " + err.message);
    }

    if (error) {
        alert(error.message);
        return;
    }

    alert("Login successful!");

    window.location.href = "dashboard.html";

    }

</script>

</body>
</html>
