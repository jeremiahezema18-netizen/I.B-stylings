<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I.B Stylings - Bookings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
</head>
<body class="bg-gray-100">
  <div class="flex">
    <div class="w-64 h-screen bg-black text-white fixed">
      <div class="p-6">
        <h1 class="text-2xl font-bold text-yellow-400">I.B Stylings</h1>
        <p class="text-gray-400 text-sm mt-1">Admin Dashboard</p>
      </div>
      <nav class="mt-8">
        <a href="dashboard.html" class="block px-6 py-4 hover:bg-gray-900">🏠 Dashboard</a>
        <a href="services.html" class="block px-6 py-4 hover:bg-gray-900">✂ Services</a>
        <a href="add-service.html" class="block px-6 py-4 hover:bg-gray-900">➕ Add Service</a>
        <a href="bookings.html" class="block px-6 py-4 bg-gray-900">📅 Bookings</a>
        <a href="#" onclick="logout()" class="block px-6 py-4 text-red-400 hover:bg-red-900">🚪 Logout</a>
      </nav>
    </div>

    <div class="ml-64 flex-1 p-10">
      <h2 class="text-4xl font-bold">Bookings</h2>
      <p class="text-gray-600 mt-2">Manage customer appointments and schedules.</p>

      <div class="bg-white rounded-xl shadow-lg mt-10 p-6 overflow-hidden">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="border-b text-gray-400">
              <th class="py-3 px-4">Client Name</th>
              <th class="py-3 px-4">Service</th>
              <th class="py-3 px-4">Date & Time</th>
              <th class="py-3 px-4">Phone</th>
              <th class="py-3 px-4">Status</th>
            </tr>
          </thead>
          <tbody id="bookingsList">
            <tr>
              <td colspan="5" class="py-6 text-center text-gray-500">Loading bookings...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    async function checkAuth() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        window.location.href = "index.html";
      }
    }

    async function loadBookings() {
      await checkAuth();
      try {
        const { data: bookings, error } = await supabase
          .from('bookings')
          .select('*')
          .order('booking_date', { ascending: false });

        if (error) throw error;

        const bookingsList = document.getElementById('bookingsList');
        bookingsList.innerHTML = '';

        if (!bookings || bookings.length === 0) {
          bookingsList.innerHTML = `<tr><td colspan="5" class="py-6 text-center text-gray-500">No bookings found.</td></tr>`;
          return;
        }

        bookings.forEach(booking => {
          const formattedDate = new Date(booking.booking_date).toLocaleString();
          const row = document.createElement('tr');
          row.className = "border-b hover:bg-gray-50";
          row.innerHTML = `
            <td class="py-4 px-4 font-semibold">${booking.client_name}</td>
            <td class="py-4 px-4">${booking.service_name || 'General Service'}</td>
            <td class="py-4 px-4 text-gray-600">${formattedDate}</td>
            <td class="py-4 px-4 font-mono">${booking.client_phone || 'N/A'}</td>
            <td class="py-4 px-4">
              <span class="bg-green-100 text-green-800 text-xs px-2.5 py-0.5 rounded-full font-bold">Confirmed</span>
            </td>
          `;
          bookingsList.appendChild(row);
        });
      } catch (err) {
        console.error("Error fetching bookings:", err.message);
      }
    }

    async function logout() {
      await supabase.auth.signOut();
      window.location.href = "index.html";
    }

    document.addEventListener("DOMContentLoaded", loadBookings);
  </script>
</body>
</html>
