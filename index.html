<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I.B STYLINGS | Luxury Unisex Hair, Nails, Lashes & Ink</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@1,400;1,600&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #0a0a0a; color: #ffffff; }
        .font-luxury { font-family: 'Cinzel', serif; }
        .font-script { font-family: 'Playfair Display', serif; font-style: italic; }
        .text-gold { color: #d4af37; }
        .border-gold { border-color: #d4af37; }
        .gold-btn { background: linear-gradient(135deg, #b38728, #daaf38, #aa771c); transition: all 0.3s ease; }
        .gold-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(218, 175, 56, 0.4); }
    </style>
</head>
<body>

    <header id="hero-section" class="relative min-h-screen flex items-center justify-center bg-black overflow-hidden">
        <div id="hero-bg" class="absolute inset-0 opacity-40 bg-cover bg-center transition-all duration-1000" 
             style="background-image: url('https://images.unsplash.com/photo-1560066984-138dadb4c035?auto=format&fit=crop&q=80&w=1600')"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-[#0a0a0a] via-transparent to-black"></div>

        <div class="relative z-10 text-center px-4 max-w-4xl">
            <span class="text-gold font-luxury tracking-[0.3em] text-sm uppercase block mb-3">Welcome to Luxury</span>
            <h1 class="text-5xl md:text-7xl lg:text-8xl font-luxury font-bold tracking-widest text-white mb-6">I.B STYLINGS</h1>
            <p class="text-stone-300 max-w-xl mx-auto text-sm md:text-base leading-relaxed tracking-wider mb-8">
                A premium unisex experience offering master-level hairstyling, exquisite nail artistry, flawless lash extensions, and custom body ink.
            </p>
            <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
                <a href="#services" class="gold-btn text-black font-bold uppercase tracking-widest text-xs px-8 py-4 w-full sm:w-auto">Explore Services</a>
                <a href="#booking" class="border border-gold text-gold hover:bg-gold hover:text-black transition duration-300 font-bold uppercase tracking-widest text-xs px-8 py-4 w-full sm:w-auto">Book Appointment</a>
            </div>
        </div>
    </header>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB6uuVSQd1mGZyJ9I9hVMHqfq6xzyoZH8c",
            authDomain: "my-ibstylings.firebaseapp.com",
            projectId: "my-ibstylings",
            storageBucket: "my-ibstylings.firebasestorage.app",
            messagingSenderId: "462689044764",
            appId: "1:462689044764:web:275fdb81d890948c6112d9",
            measurementId: "G-5K0BLV6HEH"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadHeroImage() {
            try {
                const docRef = doc(db, "Settings", "hero");
                const docSnap = await getDoc(docRef);
                if (docSnap.exists() && docSnap.data().image) {
                    document.getElementById('hero-bg').style.backgroundImage = `url('${docSnap.data().image}')`;
                }
            } catch (e) {
                console.error("Error loading hero image:", e);
            }
        }
        loadHeroImage();
    </script>

    </body>
</html>
